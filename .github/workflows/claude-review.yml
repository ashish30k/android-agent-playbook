# Automated PR review using the android-code-review skill.
# Requires ANTHROPIC_API_KEY in repo secrets.
name: Claude Code Review
on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Review this pull request using the android-code-review skill
            (.claude/skills/android-code-review/SKILL.md if vendored, or the
            installed plugin version). Follow all five steps including
            expanding beyond the diff. Post findings as a PR comment using
            the skill's output format.
          claude_args: "--allowedTools 'Bash(git diff:*),Bash(git log:*),Read,Grep,Glob'"
